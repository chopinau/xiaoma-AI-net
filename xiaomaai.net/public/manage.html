<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小马AI | 链接配置</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 2rem;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { margin-bottom: 2rem; color: #EC4899; }
        .back {
            display: inline-block;
            margin-bottom: 1rem;
            color: #06B6D4;
            text-decoration: none;
        }
        .section { margin-bottom: 2rem; }
        h2 { margin-bottom: 1rem; color: #7E22CE; }
        h2.curated { color: #06B6D4; }
        .card {
            background: rgba(0,0,0,0.6);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 0.75rem;
        }
        .card-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.75rem; }
        input, textarea {
            width: 100%;
            padding: 0.5rem;
            margin-top: 0.25rem;
            margin-bottom: 0.5rem;
            background: #1a1a1a;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
        }
        textarea { min-height: 60px; resize: vertical; }
        .status { font-size: 0.8rem; color: #666; }
        .status.valid { color: #22C55E; }
        .status.invalid { color: #EF4444; }
        .field-label {
            font-size: 0.8rem;
            color: #888;
            margin-top: 0.5rem;
        }
        .tags-container { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.25rem; }
        .tag-input-row { display: flex; gap: 0.5rem; align-items: center; margin-top: 0.5rem; }
        .btn {
            padding: 0.25rem 0.75rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .btn-add { background: #22C55E; color: #000; }
        .btn-remove { background: #EF4444; color: #fff; }
        .save-notice {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            background: rgba(34, 197, 94, 0.9);
            color: #000;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            opacity: 0;
            transition: opacity 0.3s;
            font-weight: 600;
        }
        .save-notice.show { opacity: 1; }
        .avatar-upload {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 0.5rem 0;
        }
        .avatar-preview {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            overflow: hidden;
            border: 2px solid #444;
        }
        .avatar-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .btn-upload {
            background: linear-gradient(135deg, #7E22CE, #EC4899);
            color: #fff;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .btn-confirm {
            background: linear-gradient(135deg, #22C55E, #06B6D4);
            color: #000;
            padding: 1rem 2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            margin: 1rem 0;
            width: 100%;
        }
        .save-indicator {
            color: #22C55E;
            font-size: 0.8rem;
            margin-top: 0.25rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back">← 返回首页</a>
        <h1>链接配置管理</h1>
        <p style="color: #888; margin-bottom: 1rem;">修改后刷新首页即可生效</p>
        <button class="btn-confirm" id="confirmBtn">✅ 保存并确认已绑定</button>
        
        <div class="section">
            <h2>小马AI自研</h2>
            <div id="selfDeveloped"></div>
        </div>
        
        <div class="section">
            <h2 class="curated">小马AI精选</h2>
            <div id="curated"></div>
        </div>
    </div>
    <div class="save-notice" id="saveNotice">✓ 已保存</div>

    <script>
        const TOOLS_DEFAULT = {
            selfDeveloped: [
                {
                    id: 'batch-generate',
                    name: '批量生图生视频',
                    description: '小马AI核心视觉工具，带有PSD分层，一键导出PSD功能',
                    icon: '🎬',
                    color: '#7E22CE',
                    tags: ['Image2', 'Seedance2', '核心', 'Photoshop'],
                    url: ''
                },
                {
                    id: 'hero',
                    name: 'AI 生产工厂',
                    description: '小马AI核心引擎，聚合全球顶级AI能力，一站式赋能创作者',
                    icon: 'horse',
                    color: '#7E22CE',
                    tags: ['核心', 'GPT', 'Grok', 'Gemini', 'API接入服务'],
                    url: 'https://xiaomageai.com'
                }
            ],
            curated: [
                { id: 'gpt4', name: 'GPT-4 Turbo', description: '最强大的语言模型，支持128K上下文', icon: '🧠', color: '#22C55E', tags: ['API', 'Premium'], url: 'https://openai.com/index/gpt-4-turbo/' },
                { id: 'claude', name: 'Claude 3 Opus', description: 'Anthropic旗舰模型，超长上下文理解', icon: '🎭', color: '#EC4899', tags: ['API'], url: 'https://www.anthropic.com/claude' },
                { id: 'midjourney', name: 'Midjourney V6', description: '顶级AI绘画，极致美学创作', icon: '🖼️', color: '#EAB308', tags: ['Premium'], url: 'https://www.midjourney.com/' },
                { id: 'stable', name: 'Stable Diffusion 3', description: '开源图像生成，无限可能', icon: '🌀', color: '#06B6D4', tags: ['Free', 'API'], url: 'https://stability.ai/stable-diffusion-3' },
                { id: 'suno', name: 'Suno AI', description: 'AI音乐创作，秒生神曲', icon: '🎵', color: '#F97316', tags: ['Premium'], url: 'https://suno.ai/' },
                { id: 'runway', name: 'Runway Gen-3', description: '下一代AI视频生成', icon: '🎬', color: '#7E22CE', tags: ['Premium'], url: 'https://runwayml.com/' },
                { id: 'gemini', name: 'Gemini Ultra', description: 'Google最强多模态AI', icon: '💎', color: '#22C55E', tags: ['API'], url: 'https://deepmind.google/gemini' },
                { id: 'copilot', name: 'GitHub Copilot', description: 'AI编程助手，代码自动补全', icon: '👨‍💻', color: '#EC4899', tags: ['Premium'], url: 'https://github.com/features/copilot' },
                { id: 'perplexity', name: 'Perplexity AI', description: 'AI搜索引擎，实时知识获取', icon: '🔍', color: '#EAB308', tags: ['Free', 'API'], url: 'https://www.perplexity.ai/' },
                { id: 'elevenlabs', name: 'ElevenLabs', description: '超真实AI语音克隆', icon: '🗣️', color: '#06B6D4', tags: ['API'], url: 'https://elevenlabs.io/' },
                { id: 'heygen', name: 'HeyGen', description: 'AI数字人视频生成', icon: '👤', color: '#F97316', tags: ['Premium'], url: 'https://www.heygen.com/' },
                { id: 'cursor', name: 'Cursor IDE', description: 'AI优先的代码编辑器', icon: '⚡', color: '#7E22CE', tags: ['Free'], url: 'https://cursor.com/' },
                { id: 'notion', name: 'Notion AI', description: '智能文档与知识管理', icon: '📝', color: '#22C55E', tags: ['Premium'], url: 'https://www.notion.so/product/ai' },
                { id: 'dify', name: 'Dify', description: 'LLM应用开发平台', icon: '🔧', color: '#EC4899', tags: ['Free', 'API'], url: 'https://dify.ai/' },
                { id: 'comfyui', name: 'ComfyUI', description: '节点式AI图像工作流', icon: '🔗', color: '#EAB308', tags: ['Free'], url: 'https://github.com/comfyanonymous/ComfyUI' }
            ]
        };

        let toolConfig = {
            selfDeveloped: {},
            curated: {}
        };

        function isValidUrl(string) {
            if (!string) return false;
            try { new URL(string); return true; }
            catch (_) { return string.startsWith('/') || string.startsWith('#'); }
        }

        function getUrlStatusText(url) {
            if (!url || url.trim() === '') return { class: '', text: '未配置' };
            if (isValidUrl(url)) return { class: 'valid', text: '✓ URL有效' };
            return { class: 'invalid', text: '✗ URL无效' };
        }

        function getMergedTool(section, tool) {
            const saved = toolConfig[section][tool.id] || {};
            return {
                ...tool,
                name: saved.name !== undefined ? saved.name : tool.name,
                description: saved.description !== undefined ? saved.description : tool.description,
                tags: saved.tags !== undefined ? saved.tags : tool.tags,
                url: saved.url !== undefined ? saved.url : tool.url,
                customAvatar: saved.customAvatar
            };
        }

        function render() {
            const selfEl = document.getElementById('selfDeveloped');
            const curEl = document.getElementById('curated');
            selfEl.innerHTML = '';
            curEl.innerHTML = '';

            TOOLS_DEFAULT.selfDeveloped.forEach(tool => {
                selfEl.appendChild(renderToolCard(tool, 'selfDeveloped'));
            });

            TOOLS_DEFAULT.curated.forEach(tool => {
                curEl.appendChild(renderToolCard(tool, 'curated'));
            });
        }

        function renderToolCard(tool, section) {
            const merged = getMergedTool(section, tool);
            const div = document.createElement('div');
            div.className = 'card';
            
            const tagsHtml = (merged.tags || []).map((tag, i) => `
                <div class="tag-input-row">
                    <input type="text" value="${tag}"
                        data-section="${section}" data-id="${tool.id}" data-type="tag" data-index="${i}"
                        style="flex: 1;">
                    <button class="btn btn-remove" data-section="${section}" data-id="${tool.id}" data-index="${i}" data-action="remove-tag">删除</button>
                </div>
            `).join('');

            const avatarDisplay = merged.customAvatar 
                ? `<img src="${merged.customAvatar}" alt="avatar">`
                : `<span>${tool.icon === 'horse' ? '🐴' : tool.icon}</span>`;

            div.innerHTML = `
                <div class="card-header">
                    <div class="avatar-upload">
                        <div class="avatar-preview" id="avatar-${section}-${tool.id}">
                            ${avatarDisplay}
                        </div>
                        <div>
                            <button class="btn-upload" data-section="${section}" data-id="${tool.id}">
                                📷 上传头像
                            </button>
                            <input type="file" accept="image/*" style="display: none;"
                                id="file-${section}-${tool.id}"
                                data-section="${section}" data-id="${tool.id}" data-type="avatar">
                        </div>
                    </div>
                    <strong style="margin-left: 0.5rem;">${tool.id}</strong>
                </div>
                
                <div class="field-label">显示名称</div>
                <input type="text" value="${merged.name}"
                    data-section="${section}" data-id="${tool.id}" data-type="name">
                
                <div class="field-label">描述</div>
                <textarea data-section="${section}" data-id="${tool.id}" data-type="description">${merged.description}</textarea>
                
                <div class="field-label">跳转链接</div>
                <input type="text" placeholder="输入链接" value="${merged.url}"
                    data-section="${section}" data-id="${tool.id}" data-type="url">
                <div class="status ${getUrlStatusText(merged.url).class}">${getUrlStatusText(merged.url).text}</div>
                
                <div class="field-label">标签</div>
                <div class="tags-container" id="tags-${section}-${tool.id}">
                    ${tagsHtml}
                </div>
                <button class="btn btn-add" style="margin-top: 0.5rem;"
                    data-section="${section}" data-id="${tool.id}" data-action="add-tag">+ 添加标签</button>
            `;
            return div;
        }

        function save() {
            localStorage.setItem('xiaomai_tool_links', JSON.stringify(toolConfig));
            const n = document.getElementById('saveNotice');
            n.classList.add('show');
            setTimeout(() => n.classList.remove('show'), 1500);
        }

        function load() {
            try {
                const saved = localStorage.getItem('xiaomai_tool_links');
                if (saved) toolConfig = JSON.parse(saved);
            } catch(e) { console.error('加载失败', e); }
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        document.addEventListener('input', (e) => {
            const el = e.target;
            const section = el.dataset.section;
            const id = el.dataset.id;
            const type = el.dataset.type;
            if (!section || !id) return;

            if (!toolConfig[section][id]) toolConfig[section][id] = {};

            if (type === 'tag') {
                if (!toolConfig[section][id].tags) {
                    const defaultTool = TOOLS_DEFAULT[section].find(t => t.id === id);
                    toolConfig[section][id].tags = [...(defaultTool?.tags || [])];
                }
                const idx = parseInt(el.dataset.index);
                toolConfig[section][id].tags[idx] = el.value;
            } else {
                toolConfig[section][id][type] = el.value;
            }

            if (type === 'url') {
                const status = getUrlStatusText(el.value);
                const st = el.nextElementSibling;
                if (st && st.classList.contains('status')) {
                    st.className = 'status ' + status.class;
                    st.textContent = status.text;
                }
            }

            save();
        });

        document.addEventListener('click', (e) => {
            const el = e.target;
            
            if (el.classList.contains('btn-upload')) {
                const section = el.dataset.section;
                const id = el.dataset.id;
                document.getElementById(`file-${section}-${id}`).click();
            }
            
            if (el.dataset.action === 'add-tag') {
                const section = el.dataset.section;
                const id = el.dataset.id;

                if (!toolConfig[section][id]) toolConfig[section][id] = {};
                if (!toolConfig[section][id].tags) {
                    const defaultTool = TOOLS_DEFAULT[section].find(t => t.id === id);
                    toolConfig[section][id].tags = [...(defaultTool?.tags || [])];
                }
                toolConfig[section][id].tags.push('新标签');
                render();
                save();
            }
            
            if (el.dataset.action === 'remove-tag') {
                const section = el.dataset.section;
                const id = el.dataset.id;
                const idx = parseInt(el.dataset.index);

                if (!toolConfig[section][id]) toolConfig[section][id] = {};
                if (!toolConfig[section][id].tags) {
                    const defaultTool = TOOLS_DEFAULT[section].find(t => t.id === id);
                    toolConfig[section][id].tags = [...(defaultTool?.tags || [])];
                }
                toolConfig[section][id].tags.splice(idx, 1);
                render();
                save();
            }
        });

        document.addEventListener('change', async (e) => {
            const el = e.target;
            if (el.dataset.type === 'avatar') {
                const section = el.dataset.section;
                const id = el.dataset.id;
                
                if (el.files && el.files[0]) {
                    try {
                        const base64 = await fileToBase64(el.files[0]);
                        if (!toolConfig[section][id]) toolConfig[section][id] = {};
                        toolConfig[section][id].customAvatar = base64;
                        
                        const preview = document.getElementById(`avatar-${section}-${id}`);
                        if (preview) {
                            preview.innerHTML = `<img src="${base64}" alt="avatar">`;
                        }
                        
                        save();
                    } catch (err) {
                        console.error('上传失败:', err);
                    }
                }
            }
        });

        document.getElementById('confirmBtn').addEventListener('click', () => {
            alert('✅ 所有配置已保存并确认已绑定！请刷新首页查看效果');
        });

        load();
        render();

        function initDefaults() {
            TOOLS_DEFAULT.selfDeveloped.forEach(t => {
                if (!toolConfig.selfDeveloped[t.id]) {
                    toolConfig.selfDeveloped[t.id] = {
                        name: t.name,
                        description: t.description,
                        tags: [...(t.tags || [])],
                        url: t.url || ''
                    };
                }
            });
            TOOLS_DEFAULT.curated.forEach(t => {
                if (!toolConfig.curated[t.id]) {
                    toolConfig.curated[t.id] = {
                        name: t.name,
                        description: t.description,
                        tags: [...(t.tags || [])],
                        url: t.url || ''
                    };
                }
            });
            save();
        }

        if (Object.keys(toolConfig.selfDeveloped).length === 0 && Object.keys(toolConfig.curated).length === 0) {
            initDefaults();
        }
    </script>
</body>
</html>
